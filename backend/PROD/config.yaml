General:
  system: WEC
  app: file-management
  app_type: WebAPI
  section: MK22

Log:
  version: 1
  formatters:
    format1:
      format: "[%(asctime)s.%(msecs)03d] %(filename)s:%(funcName)s:%(lineno)d %(levelname)s %(tid)s - %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"
  handlers:
    file:
      class: logging.handlers.RotatingFileHandler
      formatter: format1
      filename: log/app.log
      maxBytes: 10485760
      backupCount: 10
    console:
      class: logging.StreamHandler
      formatter: format1
  root:
    handlers: [file, console]
    level: INFO

database:
  url: "sqlite:///./file_management.db"
  wal_mode: true

cors:
  allow_origins:
    - "http://localhost:5173"

app:
  debug: false
  title: "File Management API"
  version: "1.0.0"

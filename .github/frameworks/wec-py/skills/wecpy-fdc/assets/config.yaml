# wecpy 框架設定檔（PILOT 環境）
# FdcClient 需要 ConfigManager 先初始化

General:
  system: "{IMX_SYSTEM}"
  app: "{IMX_APP}"
  app_type: Schedule
  section: MK22

Log:
  version: 1
  disable_existing_loggers: false
  formatters:
    format1:
      format: "[%(asctime)s] [%(system)s] [%(app)s] [%(filename)s:%(funcName)s] %(levelname)s %(tid)s - %(message)s"
  handlers:
    console:
      class: logging.StreamHandler
      formatter: format1
      stream: ext://sys.stdout
    file:
      class: logging.handlers.RotatingFileHandler
      formatter: format1
      filename: log/app.log
      maxBytes: 10485760
      backupCount: 5
      encoding: utf-8
  root:
    handlers:
      - console
      - file
    level: DEBUG

# =============================================================================
# wecpy 基礎組態檔案模板
# 
# 說明：
#   - 此為最小必要設定，包含 General 和 Log 區塊
#   - 依需求可加入 Database, Kafka, Apm, COP 等區塊
#   - {變數名} 會自動替換為對應的環境變數
#
# 使用方式：
#   1. 複製此檔案到 PILOT/config.yaml 和 PROD/config.yaml
#   2. 依環境調整 Log.root.level（PILOT 用 DEBUG，PROD 用 INFO）
#   3. 依需求加入其他區塊
# =============================================================================

# -----------------------------------------------------------------------------
# General 區塊 - 必要
# -----------------------------------------------------------------------------
General:
  system: "{IMX_SYSTEM}"           # 系統代碼，例如：IRS, IANALYSIS
  app: "{IMX_APP}"                 # 應用程式代碼，例如：MODEL_MONITOR
  app_type: Schedule               # 應用類型：Schedule | Listener | Web
  section: MK10                    # 部門代碼

# -----------------------------------------------------------------------------
# Log 區塊 - 必要
# -----------------------------------------------------------------------------
Log:
  version: 1
  formatters:
    format1:
      format: "[%(asctime)s.%(msecs)03d] {%(system)s %(app)s %(filename)s: %(funcName)s:%(lineno)d} %(levelname)s %(tid)s - %(message)s"
      datefmt: '%Y-%m-%d %H:%M:%S'
  handlers:
    console:
      class: logging.StreamHandler
      formatter: format1
      stream: ext://sys.stdout
    file:
      class: logging.handlers.RotatingFileHandler
      formatter: format1
      filename: log/app.log
      maxBytes: 10000000           # 10MB
      backupCount: 5               # 保留 5 個備份檔
  root:
    handlers: [console, file]
    level: INFO                    # PILOT 建議用 DEBUG，PROD 用 INFO

# =============================================================================
# 以下區塊依需求加入，取消註解並填入正確設定
# =============================================================================

